<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Webhook Receiver — Painel</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="loading-overlay show" id="loadingOverlay" role="status" aria-live="polite" aria-busy="true">
    <div class="loading-spinner" aria-hidden="true"></div>
    <p class="loading-message" id="loadingMessage">Carregando sessão...</p>
  </div>

  <div class="app app-pending">
    <aside class="sidebar" aria-label="Navegação principal">
      <div class="brand">
        <div class="name">Webhook Receiver</div>
        <div class="ver" id="brandVer">v1.0.0 · em memória</div>
      </div>
      <nav class="nav" id="nav" aria-label="Menu"></nav>
      <div class="sidebar-foot">
        <button class="nav-item" id="statusBtn" type="button">
          <span class="status-dot" aria-hidden="true"></span> Status do sistema
        </button>
        <button class="nav-item" data-view="docs" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Suporte
        </button>
        <button class="foot-btn" id="newWebhookFoot" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Novo Webhook
        </button>
      </div>
    </aside>
    <div class="backdrop" id="backdrop" aria-hidden="true"></div>

    <div class="main">
      <header class="appbar">
        <button class="menu-btn" id="menuBtn" type="button" title="Menu" aria-label="Abrir menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="abrand">Webhook Receiver</span>
        <span class="spacer"></span>
        <button class="icon-btn" id="newWebhook3" type="button" title="Novo webhook" aria-label="Novo webhook">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="icon-btn" id="themeBtn3" type="button" title="Alternar tema" aria-label="Alternar tema"></button>
      </header>

      <section id="liveView">
        <div class="events">
          <div class="col-head">
            <div class="search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              <input id="filter" type="search" placeholder="Filtrar requisições..." aria-label="Filtrar requisições" />
            </div>
          </div>
          <div class="events-sub">
            <span class="label">Eventos recebidos</span>
            <button class="link-btn" id="clearLogs" type="button">Limpar histórico</button>
          </div>
          <div class="events-list" id="eventsList" role="list" aria-label="Lista de eventos"></div>
        </div>

        <div class="details">
          <div class="topbar">
            <button class="back-btn" id="backBtn" type="button" title="Voltar" aria-label="Voltar para a lista">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
            <div class="tabs" id="viewTabs" role="tablist" aria-label="Visões da transmissão">
              <button class="tab active" data-vtab="explorer" type="button" role="tab" aria-selected="true">Explorer</button>
              <button class="tab" data-vtab="history" type="button" role="tab" aria-selected="false">Histórico</button>
              <button class="tab" data-vtab="analytics" type="button" role="tab" aria-selected="false">Analytics</button>
            </div>
            <div class="topbar-right">
              <div class="chip" id="endpointChip" title="Copiar URL do webhook" role="button" tabindex="0" aria-label="Copiar URL do webhook">
                <span class="chip-text" id="chipText">nenhum link</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              </div>
              <button class="btn-primary" id="newWebhook" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span class="btn-label">Novo webhook</span>
              </button>
              <button class="icon-btn bellhide" id="bellBtn" type="button" title="Notificações" aria-label="Notificações">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
              </button>
              <button class="icon-btn" id="themeBtn" type="button" title="Alternar tema" aria-label="Alternar tema"></button>
            </div>
          </div>

          <div class="detail-tabs" id="detailTabs" role="tablist" aria-label="Detalhes do evento">
            <button class="tab active" data-dtab="headers" type="button" role="tab" aria-selected="true">Headers</button>
            <button class="tab" data-dtab="query" type="button" role="tab" aria-selected="false">Parâmetros de query</button>
            <button class="tab" data-dtab="response" type="button" role="tab" aria-selected="false">Resposta</button>
            <button class="tab" data-dtab="trace" type="button" role="tab" aria-selected="false">Rastreamento</button>
          </div>

          <div class="detail-body" id="detailBody"></div>

          <div class="foot">
            <span id="footStorage">Dados mantidos em memória — reiniciar o servidor limpa os links e o histórico.</span>
            <span class="foot-links">
              <a href="/health" target="_blank" rel="noopener">Health</a>
              <a href="#" id="footDocs">Documentação</a>
            </span>
          </div>
        </div>
      </section>

      <section id="panelView" aria-hidden="true">
        <div class="topbar">
          <div class="tabs"><button class="tab active" id="panelTitleTab" type="button">Painel</button></div>
          <div class="topbar-right">
            <button class="btn-primary" id="newWebhook2" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span class="btn-label">Novo webhook</span>
            </button>
            <button class="icon-btn" id="themeBtn2" type="button" title="Alternar tema" aria-label="Alternar tema"></button>
          </div>
        </div>
        <div class="panel-body" id="panelBody"></div>
      </section>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="/js/app.js"></script>
</body>
</html>
