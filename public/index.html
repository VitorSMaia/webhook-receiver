<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webhook Receiver — Painel</title>
  <style>
    :root {
      --font-mono: "Geist Mono", ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sidebar-w: 236px;
      --events-w: 340px;
      --radius: 8px;
    }

    /* ---------- Tema claro (padrão) ---------- */
    [data-theme="light"] {
      --bg: #ffffff;
      --panel: #ffffff;
      --sidebar: #ffffff;
      --elev: #f9fafb;
      --border: #ececec;
      --border-strong: #e0e0e0;
      --text: #18181b;
      --text-dim: #52525b;
      --muted: #9ca3af;
      --accent: #16a34a;
      --accent-strong: #15803d;
      --accent-weak: #f0fdf4;
      --ok-bg: #dcfce7; --ok-text: #15803d;
      --err-bg: #fee2e2; --err-text: #dc2626;
      --warn-bg: #fef3c7; --warn-text: #b45309;
      --link: #2563eb;
      --hover: #f7f7f8;
      --sel-bg: #f0fdf4;
      --code-bg: #fbfbfa;
      --gutter: #bdbdbd;
      --tok-key: #24292e; --tok-str: #16a34a; --tok-num: #b45309; --tok-bool: #2563eb; --tok-punc: #6b7280;
      --dot-red: #ff5f57; --dot-yellow: #febc2e; --dot-green: #28c840;
      --shadow: 0 1px 2px rgba(0,0,0,.04);
    }

    /* ---------- Tema escuro (terminal) ---------- */
    [data-theme="dark"] {
      --bg: #0d0d0d;
      --panel: #141414;
      --sidebar: #111111;
      --elev: #1a1a1a;
      --border: #262626;
      --border-strong: #333333;
      --text: #e8eaed;
      --text-dim: #a1a1aa;
      --muted: #6b7280;
      --accent: #10b981;
      --accent-strong: #34d399;
      --accent-weak: rgba(16,185,129,.10);
      --ok-bg: rgba(16,185,129,.15); --ok-text: #34d399;
      --err-bg: rgba(255,95,87,.15); --err-text: #f87171;
      --warn-bg: rgba(254,188,46,.15); --warn-text: #fbbf24;
      --link: #60a5fa;
      --hover: #1a1a1a;
      --sel-bg: rgba(16,185,129,.10);
      --code-bg: #0a0a0a;
      --gutter: #3f3f46;
      --tok-key: #e8eaed; --tok-str: #34d399; --tok-num: #fbbf24; --tok-bool: #60a5fa; --tok-punc: #6b7280;
      --dot-red: #ff5f57; --dot-yellow: #febc2e; --dot-green: #28c840;
      --shadow: 0 1px 2px rgba(0,0,0,.4);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font-mono);
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; border: 2px solid var(--bg); }
    ::-webkit-scrollbar-track { background: transparent; }

    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ---------------- Sidebar ---------------- */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--sidebar); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .brand { padding: 20px 20px 16px; }
    .brand .name { font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
    .brand .ver { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .nav { padding: 6px 12px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 12px; border-radius: 6px; cursor: pointer;
      color: var(--text-dim); background: transparent; border: 0; width: 100%;
      font-size: 13px; text-align: left; transition: background .12s, color .12s;
    }
    .nav-item:hover { background: var(--hover); color: var(--text); }
    .nav-item.active { background: var(--accent-weak); color: var(--accent-strong); font-weight: 600; }
    .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; }
    .sidebar-foot { margin-top: auto; padding: 12px; display: flex; flex-direction: column; gap: 2px; }
    .sidebar-foot .nav-item { color: var(--text-dim); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px var(--accent-weak); }
    .foot-btn {
      margin-top: 8px; width: 100%; border: 0; cursor: pointer;
      background: var(--accent); color: #fff; font-weight: 600; font-size: 13px;
      padding: 11px; border-radius: 6px; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .12s;
    }
    .foot-btn:hover { background: var(--accent-strong); }

    /* ---------------- Main ---------------- */
    .main { flex: 1; display: flex; min-width: 0; }

    /* Live view: events + details */
    #liveView { display: flex; flex: 1; min-width: 0; }

    .events {
      width: var(--events-w); flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; min-height: 0;
    }
    .col-head {
      height: 57px; flex-shrink: 0; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 10px;
    }
    .search {
      flex: 1; display: flex; align-items: center; gap: 8px;
      background: var(--elev); border: 1px solid var(--border);
      border-radius: 6px; padding: 7px 11px; color: var(--muted);
    }
    .search svg { width: 15px; height: 15px; flex-shrink: 0; }
    .search input {
      border: 0; outline: 0; background: transparent; color: var(--text);
      font-family: inherit; font-size: 13px; width: 100%;
    }
    .search input::placeholder { color: var(--muted); }

    .events-sub {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 8px; flex-shrink: 0;
    }
    .events-sub .label { font-size: 11px; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; }
    .link-btn { background: 0; border: 0; cursor: pointer; color: var(--accent-strong); font-family: inherit; font-size: 12px; padding: 0; }
    .link-btn:hover { text-decoration: underline; }

    .events-list { overflow-y: auto; flex: 1; min-height: 0; }
    .event {
      padding: 13px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; border-left: 3px solid transparent; transition: background .1s;
    }
    .event:hover { background: var(--hover); }
    .event.active { background: var(--sel-bg); border-left-color: var(--accent); }
    .event-row1 { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .event .method { font-weight: 700; font-size: 13px; color: var(--text); }
    .event .time { font-size: 11px; color: var(--muted); }
    .event-row2 { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
    .event .path { font-size: 12px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status {
      font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
      letter-spacing: .02em;
    }
    .status.ok { background: var(--ok-bg); color: var(--ok-text); }
    .status.err { background: var(--err-bg); color: var(--err-text); }
    .status.warn { background: var(--warn-bg); color: var(--warn-text); }

    /* Details */
    .details { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
    .topbar {
      height: 57px; flex-shrink: 0; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 8px;
    }
    .tabs { display: flex; gap: 20px; }
    .tab {
      background: 0; border: 0; cursor: pointer; font-family: inherit; font-size: 13px;
      color: var(--muted); padding: 6px 0; border-bottom: 2px solid transparent; margin-bottom: -2px;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent-strong); border-bottom-color: var(--accent); font-weight: 600; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .chip {
      display: flex; align-items: center; gap: 8px; max-width: 260px;
      background: var(--elev); border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 10px; cursor: pointer; color: var(--text-dim); font-size: 12px;
    }
    .chip:hover { border-color: var(--border-strong); }
    .chip .chip-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip svg { width: 13px; height: 13px; flex-shrink: 0; }
    .btn-primary {
      display: flex; align-items: center; gap: 7px; border: 0; cursor: pointer;
      background: var(--accent); color: #fff; font-weight: 600; font-size: 12.5px;
      padding: 8px 13px; border-radius: 6px; white-space: nowrap; transition: background .12s;
    }
    .btn-primary:hover { background: var(--accent-strong); }
    .btn-primary svg { width: 14px; height: 14px; }
    .icon-btn {
      background: 0; border: 0; cursor: pointer; color: var(--text-dim);
      width: 32px; height: 32px; border-radius: 6px; display: grid; place-items: center;
    }
    .icon-btn:hover { background: var(--hover); color: var(--text); }
    .icon-btn svg { width: 17px; height: 17px; }

    .detail-tabs {
      height: 44px; flex-shrink: 0; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 22px; padding: 0 20px;
    }
    .detail-tabs .tab { font-size: 12.5px; }

    .detail-body { flex: 1; overflow-y: auto; min-height: 0; padding: 20px 22px; }
    .detail-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; margin: 0 0 16px; }
    .detail-title svg { width: 16px; height: 16px; color: var(--accent); }

    .kv { display: grid; grid-template-columns: minmax(120px, 190px) 1fr; row-gap: 11px; column-gap: 16px; font-size: 12.5px; }
    .kv .k { color: var(--text-dim); }
    .kv .v { color: var(--text); word-break: break-all; }
    .kv .v.link { color: var(--link); }

    .section-label { font-size: 12px; color: var(--text-dim); margin: 22px 0 8px; display: flex; align-items: center; justify-content: space-between; }
    .section-label .link-btn { font-size: 11px; }

    /* Code block */
    .code {
      display: flex; background: var(--code-bg); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; font-size: 12.5px; line-height: 1.7;
    }
    .code-gutter {
      padding: 12px 12px 12px 14px; text-align: right; color: var(--gutter);
      user-select: none; border-right: 1px solid var(--border); white-space: pre; flex-shrink: 0;
    }
    .code-body { margin: 0; padding: 12px 16px; overflow-x: auto; white-space: pre; flex: 1; }
    .tok-key { color: var(--tok-key); }
    .tok-str { color: var(--tok-str); }
    .tok-num { color: var(--tok-num); }
    .tok-bool { color: var(--tok-bool); }
    .tok-punc { color: var(--tok-punc); }

    .empty { color: var(--muted); text-align: center; padding: 60px 20px; font-size: 13px; line-height: 1.7; }
    .empty svg { width: 34px; height: 34px; margin-bottom: 12px; opacity: .6; }

    .foot {
      height: 40px; flex-shrink: 0; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; font-size: 11.5px; color: var(--muted);
    }
    .foot .foot-links { display: flex; gap: 16px; }
    .foot a { color: var(--muted); text-decoration: none; }
    .foot a:hover { color: var(--text); }

    /* Generic panel view (endpoints, docs, keys, settings) */
    #panelView { flex: 1; display: none; flex-direction: column; min-width: 0; }
    .panel-body { flex: 1; overflow-y: auto; padding: 26px 30px; max-width: 860px; }
    .panel-body h1 { font-size: 20px; margin: 0 0 4px; }
    .panel-body .sub { color: var(--text-dim); margin: 0 0 22px; font-size: 13px; }
    .panel-body h2 { font-size: 14px; margin: 24px 0 10px; }
    .panel-body p { color: var(--text-dim); line-height: 1.7; }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 18px; margin-bottom: 12px;
    }
    .link-card { display: flex; align-items: center; gap: 12px; }
    .link-card .url { flex: 1; word-break: break-all; font-size: 12.5px; }
    .link-card .url .local { display: block; color: var(--muted); font-size: 11.5px; margin-top: 3px; }
    .mini-btn {
      background: var(--elev); border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 10px; font-size: 12px; cursor: pointer; color: var(--text-dim); font-family: inherit;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .mini-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .mini-btn.danger:hover { border-color: var(--err-text); color: var(--err-text); }
    .mini-btn svg { width: 13px; height: 13px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
      padding: 4px 9px; border-radius: 999px; border: 1px solid var(--border); color: var(--text-dim);
    }
    .badge .status-dot { box-shadow: none; }
    .badge.on .status-dot { background: var(--accent); }
    .badge.off .status-dot { background: var(--warn-text); }
    .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .seg button { background: var(--panel); border: 0; padding: 7px 14px; cursor: pointer; font-family: inherit; font-size: 12.5px; color: var(--text-dim); }
    .seg button.active { background: var(--accent); color: #fff; }
    .cmd { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; font-size: 12.5px; overflow-x: auto; white-space: pre; color: var(--text); }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: var(--text); color: var(--bg); padding: 9px 16px; border-radius: 8px;
      font-size: 12.5px; opacity: 0; transition: all .2s ease; pointer-events: none; z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 900px) {
      .events { width: 260px; }
      .chip { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="name">Webhook Receiver</div>
        <div class="ver" id="brandVer">v1.0.0 · em memória</div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-foot">
        <button class="nav-item" id="statusBtn">
          <span class="status-dot"></span> System Status
        </button>
        <button class="nav-item" data-view="docs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Support
        </button>
        <button class="foot-btn" id="newWebhookFoot">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Novo Webhook
        </button>
      </div>
    </aside>

    <div class="main">
      <!-- Live Stream view -->
      <section id="liveView">
        <div class="events">
          <div class="col-head">
            <div class="search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              <input id="filter" type="text" placeholder="Filtrar requisições..." />
            </div>
          </div>
          <div class="events-sub">
            <span class="label">Incoming Events</span>
            <button class="link-btn" id="clearLogs">Clear Logs</button>
          </div>
          <div class="events-list" id="eventsList"></div>
        </div>

        <div class="details">
          <div class="topbar">
            <div class="tabs" id="viewTabs">
              <button class="tab active" data-vtab="explorer">Explorer</button>
              <button class="tab" data-vtab="history">History</button>
              <button class="tab" data-vtab="analytics">Analytics</button>
            </div>
            <div class="topbar-right">
              <div class="chip" id="endpointChip" title="Copiar URL do webhook">
                <span class="chip-text" id="chipText">nenhum link</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              </div>
              <button class="btn-primary" id="newWebhook">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Webhook
              </button>
              <button class="icon-btn" id="bellBtn" title="Notificações">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
              </button>
              <button class="icon-btn" id="themeBtn" title="Alternar tema"></button>
            </div>
          </div>

          <div class="detail-tabs" id="detailTabs">
            <button class="tab active" data-dtab="headers">Headers</button>
            <button class="tab" data-dtab="query">Query Params</button>
            <button class="tab" data-dtab="response">Response</button>
            <button class="tab" data-dtab="trace">Trace</button>
          </div>

          <div class="detail-body" id="detailBody"></div>

          <div class="foot">
            <span>Dados mantidos em memória — reiniciar o servidor limpa os links e o histórico.</span>
            <span class="foot-links">
              <a href="/health" target="_blank">Health</a>
              <a href="#" id="footDocs">Docs</a>
            </span>
          </div>
        </div>
      </section>

      <!-- Generic panel view -->
      <section id="panelView">
        <div class="topbar">
          <div class="tabs"><button class="tab active" id="panelTitleTab">Painel</button></div>
          <div class="topbar-right">
            <button class="btn-primary" id="newWebhook2">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              New Webhook
            </button>
            <button class="icon-btn" id="themeBtn2" title="Alternar tema"></button>
          </div>
        </div>
        <div class="panel-body" id="panelBody"></div>
      </section>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (s, r = document) => r.querySelector(s);
    const $$ = (s, r = document) => [...r.querySelectorAll(s)];

    const ICONS = {
      live: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><polygon points="10 8 15 10.5 10 13" fill="currentColor" stroke="none"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
      endpoints: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
      docs: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
      keys: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="4.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3"/></svg>',
      settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
      sun: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/></svg>',
      moon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
      copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
      trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
      info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
      inbox: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>',
    };

    const NAV = [
      { view: 'live', label: 'Live Stream', icon: 'live' },
      { view: 'endpoints', label: 'Endpoints', icon: 'endpoints' },
      { view: 'docs', label: 'Documentation', icon: 'docs' },
      { view: 'keys', label: 'API Keys', icon: 'keys' },
      { view: 'settings', label: 'Settings', icon: 'settings' },
    ];

    const state = {
      view: 'live',
      dtab: 'headers',
      vtab: 'explorer',
      config: {},
      links: [],
      webhooks: [],
      selectedId: null,
      filter: '',
      theme: localStorage.getItem('wr-theme') || 'light',
    };

    let refreshTimer = null;

    /* ---------- helpers ---------- */
    function el(tag, props = {}, kids = []) {
      const n = document.createElement(tag);
      for (const [k, v] of Object.entries(props)) {
        if (k === 'class') n.className = v;
        else if (k === 'html') n.innerHTML = v;
        else if (k === 'text') n.textContent = v;
        else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
        else if (v != null) n.setAttribute(k, v);
      }
      (Array.isArray(kids) ? kids : [kids]).forEach((c) => {
        if (c == null) return;
        n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
      return n;
    }
    function toast(msg) {
      const t = $('#toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 1800);
    }
    async function copy(text) {
      try { await navigator.clipboard.writeText(text); toast('Copiado: ' + text); }
      catch { toast('Não foi possível copiar'); }
    }
    function fmtTime(iso) {
      return new Date(iso).toLocaleTimeString('pt-BR', { hour12: false });
    }
    function statusOf(h) {
      if (h.signatureValid === false) return { cls: 'err', text: String(h.responseStatus || 401) };
      return { cls: 'ok', text: (h.responseStatus || 200) + ' OK' };
    }
    function activeLink() { return state.links[0] || null; }

    function highlightJSON(value) {
      let str;
      try { str = JSON.stringify(value, null, 2); } catch { str = String(value); }
      if (str === undefined) str = 'null';
      const esc = str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const html = esc.replace(
        /("(?:\\.|[^"\\])*"(\s*:)?|\b(?:true|false|null)\b|-?\d+(?:\.\d+)?(?:[eE][+\-]?\d+)?)/g,
        (m) => {
          let cls = 'tok-num';
          if (/^"/.test(m)) cls = /:\s*$/.test(m) ? 'tok-key' : 'tok-str';
          else if (/true|false/.test(m)) cls = 'tok-bool';
          else if (/null/.test(m)) cls = 'tok-bool';
          return '<span class="' + cls + '">' + m + '</span>';
        }
      );
      return { html, lines: str.split('\n').length };
    }
    function codeBlock(value) {
      const { html, lines } = highlightJSON(value);
      const gutter = Array.from({ length: lines }, (_, i) => i + 1).join('\n');
      return el('div', { class: 'code' }, [
        el('div', { class: 'code-gutter', text: gutter }),
        el('pre', { class: 'code-body', html }),
      ]);
    }

    /* ---------- theme ---------- */
    function applyTheme() {
      document.documentElement.setAttribute('data-theme', state.theme);
      const icon = state.theme === 'light' ? ICONS.moon : ICONS.sun;
      $$('#themeBtn, #themeBtn2').forEach((b) => (b.innerHTML = icon));
    }
    function toggleTheme() {
      state.theme = state.theme === 'light' ? 'dark' : 'light';
      localStorage.setItem('wr-theme', state.theme);
      applyTheme();
    }

    /* ---------- nav ---------- */
    function renderNav() {
      const nav = $('#nav');
      nav.innerHTML = '';
      NAV.forEach((item) => {
        nav.append(
          el('button', {
            class: 'nav-item' + (state.view === item.view ? ' active' : ''),
            html: ICONS[item.icon] + '<span>' + item.label + '</span>',
            onclick: () => setView(item.view),
          })
        );
      });
    }
    function setView(view) {
      state.view = view;
      renderNav();
      const isLive = view === 'live';
      $('#liveView').style.display = isLive ? 'flex' : 'none';
      $('#panelView').style.display = isLive ? 'none' : 'flex';
      if (isLive) { renderEvents(); renderDetail(); }
      else renderPanel(view);
    }

    /* ---------- data ---------- */
    async function loadState() {
      const res = await fetch('/api/state');
      const s = await res.json();
      state.config = s;
      state.links = s.links || [];
      $('#brandVer').textContent = 'v1.0.0 · sessão ' + (s.session || '—');
      renderChip();
      if (state.view !== 'live') renderPanel(state.view);
    }
    async function loadWebhooks() {
      const res = await fetch('/api/webhooks');
      state.webhooks = await res.json();
      if (!state.webhooks.find((w) => w.id === state.selectedId)) {
        state.selectedId = state.webhooks[0]?.id || null;
      }
      if (state.view === 'live') { renderEvents(); renderDetail(); }
    }

    function renderChip() {
      const link = activeLink();
      const text = link ? (link.publicUrl || link.localUrl).replace(/^https?:\/\//, '') : 'nenhum link';
      $('#chipText').textContent = text;
    }

    /* ---------- events list ---------- */
    function filteredWebhooks() {
      const q = state.filter.trim().toLowerCase();
      if (!q) return state.webhooks;
      return state.webhooks.filter((w) =>
        (w.path + ' ' + w.method + ' ' + statusOf(w).text).toLowerCase().includes(q)
      );
    }
    function renderEvents() {
      const list = $('#eventsList');
      list.innerHTML = '';
      const hooks = filteredWebhooks();
      if (!hooks.length) {
        list.append(el('div', { class: 'empty', html: ICONS.inbox + '<div>Nenhum evento recebido ainda.<br>Envie um POST para o link do webhook.</div>' }));
        return;
      }
      hooks.forEach((h) => {
        const st = statusOf(h);
        list.append(
          el('div', {
            class: 'event' + (h.id === state.selectedId ? ' active' : ''),
            onclick: () => { state.selectedId = h.id; renderEvents(); renderDetail(); },
          }, [
            el('div', { class: 'event-row1' }, [
              el('span', { class: 'method', text: h.method }),
              el('span', { class: 'time', text: fmtTime(h.receivedAt) }),
            ]),
            el('div', { class: 'event-row2' }, [
              el('span', { class: 'status ' + st.cls, text: st.text }),
              el('span', { class: 'path', text: h.path }),
            ]),
          ])
        );
      });
    }

    /* ---------- detail ---------- */
    function selectedHook() { return state.webhooks.find((w) => w.id === state.selectedId) || null; }

    function renderDetail() {
      const body = $('#detailBody');
      body.innerHTML = '';
      const h = selectedHook();
      if (!h) {
        body.append(el('div', { class: 'empty', html: ICONS.inbox + '<div>Selecione um evento para ver os detalhes.</div>' }));
        return;
      }
      if (state.dtab === 'headers') renderHeadersTab(body, h);
      else if (state.dtab === 'query') renderQueryTab(body, h);
      else if (state.dtab === 'response') renderResponseTab(body, h);
      else renderTraceTab(body, h);
    }

    function kv(pairs) {
      const grid = el('div', { class: 'kv' });
      pairs.forEach(([k, v, isLink]) => {
        grid.append(el('div', { class: 'k', text: k }), el('div', { class: 'v' + (isLink ? ' link' : ''), text: v == null ? '—' : String(v) }));
      });
      return grid;
    }

    function renderHeadersTab(body, h) {
      body.append(el('h3', { class: 'detail-title', html: ICONS.info + '<span>Request Details</span>' }));
      const hd = h.headers || {};
      const primary = [
        ['Host:', hd.host],
        ['User-Agent:', hd['user-agent']],
        ['Content-Type:', h.contentType || hd['content-type'], true],
        ['X-Request-Id:', hd['x-request-id'] || h.id],
      ];
      body.append(kv(primary));
      const rest = Object.entries(hd).filter(([k]) => !['host', 'user-agent', 'content-type', 'x-request-id'].includes(k));
      if (rest.length) {
        body.append(el('div', { class: 'section-label' }, [el('span', { text: 'Todos os headers' })]));
        body.append(kv(rest.map(([k, v]) => [k + ':', Array.isArray(v) ? v.join(', ') : v])));
      }
      body.append(el('div', { class: 'section-label' }, [
        el('span', { text: 'Payload Body' }),
        el('button', { class: 'link-btn', text: '⧉ Copy JSON', onclick: () => copy(h.rawBody || JSON.stringify(h.body, null, 2)) }),
      ]));
      body.append(bodyBlock(h));
    }

    function bodyBlock(h) {
      if (h.body != null) return codeBlock(h.body);
      if (h.rawBody) {
        return el('div', { class: 'code' }, [
          el('div', { class: 'code-gutter', text: h.rawBody.split('\n').map((_, i) => i + 1).join('\n') }),
          el('pre', { class: 'code-body', text: h.rawBody }),
        ]);
      }
      return el('div', { class: 'empty', text: '(corpo vazio)' });
    }

    function renderQueryTab(body, h) {
      body.append(el('h3', { class: 'detail-title', html: ICONS.info + '<span>Query Params</span>' }));
      const q = h.query || {};
      const entries = Object.entries(q);
      if (!entries.length) { body.append(el('div', { class: 'empty', text: 'Nenhum parâmetro de query nesta requisição.' })); return; }
      body.append(kv(entries.map(([k, v]) => [k, Array.isArray(v) ? v.join(', ') : v])));
    }

    function renderResponseTab(body, h) {
      const st = statusOf(h);
      body.append(el('h3', { class: 'detail-title', html: ICONS.info + '<span>Response</span>' }));
      body.append(kv([
        ['Status:', st.text],
        ['Assinatura:', h.signatureValid === true ? 'válida' : h.signatureValid === false ? 'inválida' : 'não verificada'],
      ]));
      body.append(el('div', { class: 'section-label' }, [el('span', { text: 'Response Body' })]));
      body.append(codeBlock(h.responseBody ?? { received: h.signatureValid !== false }));
    }

    function renderTraceTab(body, h) {
      body.append(el('h3', { class: 'detail-title', html: ICONS.info + '<span>Trace</span>' }));
      body.append(kv([
        ['Event ID:', h.id],
        ['Recebido em:', new Date(h.receivedAt).toLocaleString('pt-BR')],
        ['Método:', h.method],
        ['Rota:', h.path],
        ['URL original:', h.originalUrl],
        ['IP de origem:', h.ip],
        ['Content-Type:', h.contentType],
        ['Tamanho do corpo:', (h.rawBody ? h.rawBody.length : 0) + ' bytes'],
      ]));
    }

    /* ---------- panel views ---------- */
    function renderPanel(view) {
      const b = $('#panelBody');
      b.innerHTML = '';
      $('#panelTitleTab').textContent = NAV.find((n) => n.view === view)?.label || 'Painel';
      if (view === 'endpoints') return renderEndpoints(b);
      if (view === 'docs') return renderDocs(b);
      if (view === 'keys') return renderKeys(b);
      if (view === 'settings') return renderSettings(b);
    }

    function renderEndpoints(b) {
      b.append(el('h1', { text: 'Endpoints' }));
      b.append(el('p', { class: 'sub', text: 'Rotas ativas para receber webhooks. Cada uma é difícil de adivinhar.' }));
      b.append(el('button', { class: 'btn-primary', html: '＋ Gerar novo link', style: 'margin-bottom:16px', onclick: newWebhook }));
      if (!state.links.length) { b.append(el('div', { class: 'empty', text: 'Nenhum link ativo.' })); return; }
      state.links.forEach((link) => {
        const primary = link.publicUrl || link.localUrl;
        b.append(el('div', { class: 'card link-card' }, [
          el('div', { class: 'url' }, [
            document.createTextNode(primary),
            link.publicUrl ? el('span', { class: 'local', text: 'local: ' + link.localUrl }) : null,
          ]),
          el('button', { class: 'mini-btn', html: ICONS.copy + 'Copiar', onclick: () => copy(primary) }),
          el('button', { class: 'mini-btn danger', html: ICONS.trash, title: 'Remover', onclick: () => removeLink(link.path) }),
        ]));
      });
    }

    function renderDocs(b) {
      const link = activeLink();
      const url = link ? (link.publicUrl || link.localUrl) : 'http://localhost:3000/<rota>';
      b.append(el('h1', { text: 'Documentation' }));
      b.append(el('p', { class: 'sub', text: 'Servidor leve para receber e inspecionar webhooks com verificação de assinatura HMAC-SHA256.' }));
      b.append(el('h2', { text: 'Como usar' }));
      b.append(el('p', { text: '1. Copie a URL do webhook (Endpoints ou o chip no topo). 2. Configure-a no serviço de origem. 3. Acompanhe as requisições em Live Stream.' }));
      b.append(el('h2', { text: 'Teste rápido (curl)' }));
      b.append(el('div', { class: 'cmd', text: 'curl -X POST ' + url + ' \\\n  -H "Content-Type: application/json" \\\n  -d \'{"evento":"teste","id":1}\'' }));
      b.append(el('h2', { text: 'Verificação de assinatura' }));
      b.append(el('p', { text: 'O servidor de origem calcula HMAC-SHA256(corpo, WEBHOOK_SECRET) e envia no header "' + (state.config.signatureHeader || 'x-signature') + '". O receptor recalcula e compara em tempo constante.' }));
      b.append(el('p', { text: 'Documentação completa em DOCUMENTACAO.md na raiz do projeto.' }));
    }

    function renderKeys(b) {
      const c = state.config;
      b.append(el('h1', { text: 'API Keys' }));
      b.append(el('p', { class: 'sub', text: 'Configuração de assinatura e segredo (definidos no arquivo .env).' }));
      b.append(el('div', { class: 'card' }, [
        kv([
          ['Verificação de assinatura:', c.verifySignature ? 'ativada' : 'desativada'],
          ['Header de assinatura:', c.signatureHeader],
          ['Segredo (WEBHOOK_SECRET):', c.secretConfigured ? '•••••••••• configurado' : 'não configurado'],
        ]),
      ]));
      b.append(el('p', { text: 'O segredo nunca é exposto pelo painel. Para gerar um novo, atualize WEBHOOK_SECRET no .env e reinicie o servidor.' }));
    }

    function renderSettings(b) {
      const c = state.config;
      b.append(el('h1', { text: 'Settings' }));
      b.append(el('p', { class: 'sub', text: 'Configuração do servidor e preferências do painel.' }));
      b.append(el('div', { class: 'card' }, [
        kv([
          ['Sessão:', c.session],
          ['Porta:', c.port],
          ['URL pública:', c.publicUrl || 'não definida'],
          ['Verificação de assinatura:', c.verifySignature ? 'ON (' + c.signatureHeader + ')' : 'OFF'],
          ['Links ativos:', state.links.length],
          ['Eventos em memória:', state.webhooks.length],
        ]),
      ]));
      b.append(el('p', { text: 'Cada sessão (navegador) é isolada: você só vê os próprios links e webhooks. Abrir em outro navegador ou aba anônima cria uma nova sessão.' }));
      b.append(el('h2', { text: 'Tema' }));
      const seg = el('div', { class: 'seg' }, [
        el('button', { class: state.theme === 'light' ? 'active' : '', text: 'Claro', onclick: () => { if (state.theme !== 'light') toggleTheme(); renderSettings(b); } }),
        el('button', { class: state.theme === 'dark' ? 'active' : '', text: 'Escuro', onclick: () => { if (state.theme !== 'dark') toggleTheme(); renderSettings(b); } }),
      ]);
      b.append(seg);
      b.append(el('h2', { text: 'Histórico' }));
      b.append(el('button', { class: 'mini-btn danger', html: ICONS.trash + 'Limpar todos os eventos', onclick: clearLogs }));
    }

    /* ---------- actions ---------- */
    async function newWebhook() {
      const res = await fetch('/api/links', { method: 'POST' });
      const link = await res.json();
      await loadState();
      state.links = [link, ...state.links.filter((l) => l.path !== link.path)];
      renderChip();
      if (state.view === 'endpoints') renderPanel('endpoints');
      toast('Novo link gerado');
      copy(link.publicUrl || link.localUrl);
    }
    async function removeLink(path) {
      if (!confirm('Remover este link? POSTs para ele deixarão de ser aceitos.')) return;
      await fetch('/api/links' + path, { method: 'DELETE' });
      await loadState();
      if (state.view === 'endpoints') renderPanel('endpoints');
      toast('Link removido');
    }
    async function clearLogs() {
      if (!confirm('Limpar todo o histórico de eventos?')) return;
      await fetch('/api/webhooks', { method: 'DELETE' });
      state.selectedId = null;
      await loadWebhooks();
      if (state.view !== 'live') renderPanel(state.view);
      toast('Histórico limpo');
    }
    function pingStatus() {
      fetch('/health').then((r) => r.json()).then((s) => toast('Sistema ' + s.status + ' · uptime ' + Math.round(s.uptime) + 's')).catch(() => toast('Servidor indisponível'));
    }

    function setAutoRefresh(on) {
      clearInterval(refreshTimer);
      if (on) refreshTimer = setInterval(() => { if (state.view === 'live') loadWebhooks(); }, 2000);
    }

    /* ---------- wire up ---------- */
    $$('#detailTabs .tab').forEach((t) => t.addEventListener('click', () => {
      state.dtab = t.dataset.dtab;
      $$('#detailTabs .tab').forEach((x) => x.classList.toggle('active', x === t));
      renderDetail();
    }));
    $$('#viewTabs .tab').forEach((t) => t.addEventListener('click', () => {
      state.vtab = t.dataset.vtab;
      $$('#viewTabs .tab').forEach((x) => x.classList.toggle('active', x === t));
      // Explorer/History/Analytics ajustam a ordenação/visão da lista (mesma fonte de dados).
      renderEvents();
    }));
    $('#filter').addEventListener('input', (e) => { state.filter = e.target.value; renderEvents(); });
    $('#newWebhook').addEventListener('click', newWebhook);
    $('#newWebhook2').addEventListener('click', newWebhook);
    $('#newWebhookFoot').addEventListener('click', newWebhook);
    $('#clearLogs').addEventListener('click', clearLogs);
    $('#endpointChip').addEventListener('click', () => { const l = activeLink(); if (l) copy(l.publicUrl || l.localUrl); });
    $('#themeBtn').addEventListener('click', toggleTheme);
    $('#themeBtn2').addEventListener('click', toggleTheme);
    $('#statusBtn').addEventListener('click', pingStatus);
    $('#bellBtn').addEventListener('click', () => toast('Notificações: ' + state.webhooks.length + ' evento(s) em memória'));
    $('#footDocs').addEventListener('click', (e) => { e.preventDefault(); setView('docs'); });

    /* ---------- boot ---------- */
    applyTheme();
    renderNav();
    loadState().then(loadWebhooks);
    setAutoRefresh(true);
  </script>
</body>
</html>
